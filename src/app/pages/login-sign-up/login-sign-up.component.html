<div class="login-page">

  <div class="login-page__container">

    <img alt="Logo" src="assets/logo.png">
    <form [formGroup]="loginForm" (submit)="submitLogin()" *ngIf="typeForm === 'login'; else signUp">
      <mat-form-field>
        <mat-label>CPF</mat-label>
        <input formControlName="cpf" matInput placeholder="Apenas números">
        <mat-icon matSuffix>perm_identity</mat-icon>
      </mat-form-field>
      <mat-form-field>
        <mat-label>Senha</mat-label>
        <input formControlName="password" matInput placeholder="Senha" [type]="typeInput">
        <mat-icon [style.cursor]="'pointer'" (click)="tradeTypeInput()" matSuffix>lock_open</mat-icon>
      </mat-form-field>

      <div class="container-buttons">
        <button [disabled]="!loginForm.valid" type="submit" mat-stroked-button>Entrar</button>
      </div>
      <button (click)="tradeTypeForm()" class="signup-option">Ainda não possui acesso? <strong>Clique aqui.</strong></button>
    </form>

    <ng-template #signUp>
      <button (click)="tradeTypeForm()" class="container-back-to-login">
        <mat-icon>keyboard_arrow_left</mat-icon>
        <span>Voltar</span>
      </button>
      <form [formGroup]="signUpForm" (submit)="submitSignUp()">
        <mat-form-field appearance="outline">
          <mat-label>Nome</mat-label>
          <input  formControlName="name" matInput placeholder="Nome">
        </mat-form-field>
        <mat-form-field  appearance="outline">
          <mat-label>Telefone</mat-label>
          <input formControlName="phone" (input)="filterNumbers('phone')" type="tel" matInput placeholder="Apenas números">
        </mat-form-field>
        <mat-form-field  appearance="outline">
          <mat-label>E-mail</mat-label>
          <input formControlName="email" matInput placeholder="Seu melhor e-mail">
        </mat-form-field>
        <mat-form-field  appearance="outline">
          <mat-label>CPF</mat-label>
          <input (input)="filterNumbers('cpf')" formControlName="cpf" matInput placeholder="Apenas números">
        </mat-form-field>

        <mat-form-field >
          <mat-label>Data de nascimento</mat-label>
          <input [max]="maxDate" formControlName="birthDate" matInput [matDatepicker]="picker">
          <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
          <mat-datepicker #picker></mat-datepicker>
        </mat-form-field>
        <mat-form-field appearance="outline">
          <mat-label>Senha</mat-label>
          <input formControlName="password" matInput type="password" placeholder="Senha">
        </mat-form-field>
        <button [disabled]="!signUpForm.valid" type="submit" mat-stroked-button>Cadastre-se</button>
      </form>
    </ng-template>
  </div>

</div>
