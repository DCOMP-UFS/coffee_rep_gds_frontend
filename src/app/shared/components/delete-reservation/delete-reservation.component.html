<h2 mat-dialog-title>Deseja realmente realizar esta ação?</h2>
<mat-dialog-content>
  Você deseja cancelar apenas esta reserva ou toda a recorrência? Esta ação será irreversível.
</mat-dialog-content>
<mat-dialog-actions>
  <button mat-button mat-dialog-close>Cancelar</button>
  <button mat-button (click)="close('todas')" >Cancelar todas</button>
  <button mat-button (click)="close('pontual')" >Cancelar apenas esta</button>
</mat-dialog-actions>
