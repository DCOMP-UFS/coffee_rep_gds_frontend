@if(this.events.length > 0){
  <full-calendar [options]='calendarOptions()'>
    <ng-template let-arg>
      <b>{{ arg.timeText }}</b>
      <i>{{ arg.event.title }}</i>
    </ng-template>
  </full-calendar>
  <div class="container-legend">
    <div class="container-dots">
      <div class="dot"></div> Pontual
    </div>
    <div class="container-dots">
      <div class="dot-b"></div> Recorrente
    </div>
  </div>
}
