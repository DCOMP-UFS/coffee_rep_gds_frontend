<div class="calendar-panel">
  <div class="calendar-panel__legend" aria-label="Legenda de reservas">
    <div class="calendar-panel__legend-item">
      <span
        class="calendar-panel__dot"
        [style.backgroundColor]="legendColors.pontual"
      ></span>
      Pontual
    </div>
    <div class="calendar-panel__legend-item">
      <span
        class="calendar-panel__dot"
        [style.backgroundColor]="legendColors.recorrente"
      ></span>
      Recorrente
    </div>
    <div class="calendar-panel__legend-item">
      <span
        class="calendar-panel__dot"
        [style.backgroundColor]="legendColors.ausencia"
      ></span>
      Livre (férias / ausência)
    </div>
  </div>
  <full-calendar [options]="calendarOptions()"></full-calendar>
</div>
