<h2 mat-dialog-title>Cadastro de Sala</h2>
<mat-dialog-content class="mat-typography">
  <form [formGroup]="roomForm">

    <mat-form-field>
      <mat-label>Nome da sala</mat-label>
      <input formControlName="name" matInput type="name" placeholder="Nome da sala">
    </mat-form-field>

    <mat-form-field>
      <mat-label>Setor</mat-label>
      <mat-select formControlName="section">
        @for (section of data.sections; track section.id) {
          <mat-option value="{{section.id}}">{{ section.nome }}</mat-option>
        }
      </mat-select>
    </mat-form-field>

  </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close>Cancelar</button>
  <button mat-button cdkFocusInitial (click)="submit()" >Salvar</button>
</mat-dialog-actions>
