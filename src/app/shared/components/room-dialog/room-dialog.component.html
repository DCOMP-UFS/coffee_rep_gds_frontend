<h2 mat-dialog-title>{{ data.element ? 'Editar sala' : 'Cadastro de sala' }}</h2>
<mat-dialog-content class="dialog-form-content room-dialog-content">
  <form class="form-stack" [formGroup]="roomForm">

    <mat-form-field class="room-dialog-field">
      <mat-label>Nome da sala</mat-label>
      <input formControlName="name" matInput type="text" placeholder="Ex.: Consultório 12" autocomplete="off">
      @if (roomForm.controls['name'].invalid && roomForm.controls['name'].touched) {
        <mat-error>Informe o nome da sala.</mat-error>
      }
    </mat-form-field>

    <app-searchable-select-field
      class="room-dialog-field"
      label="Setor"
      preset="section"
      formControlName="section"
      [options]="mapSectionOptions(data.sections ?? [])"
    />

  </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close type="button">Cancelar</button>
  <button mat-flat-button color="primary" type="button"
          [disabled]="!data.sections?.length || roomForm.invalid || (roomDialogComponentStore.saving$ | async)"
          (click)="submit()">
    @if (roomDialogComponentStore.saving$ | async) {
      Salvando…
    } @else {
      Salvar
    }
  </button>
</mat-dialog-actions>
