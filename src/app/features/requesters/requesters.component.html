<div class="container-requester-page">
  <mat-card>
    <div class="card-requester">
      <mat-card-title>
        <div class="card-title">
          <mat-icon>person</mat-icon>
          <span>Solicitantes</span>
        </div>
      </mat-card-title>
      <mat-card-content>
        <button class="default-button" (click)="openDialog()" >Novo Solicitante</button>
      </mat-card-content>
    </div>

  </mat-card>
  <mat-card>
    <div class="table-container">
      @if (!(store.getRequesters | async)?.content?.length) {
      <app-empty-state
        icon="person"
        title="Nenhum solicitante cadastrado"
        description="Cadastre solicitantes para vincular às reservas."
        actionLabel="Novo Solicitante"
        (action)="openDialog()"
      />
      } @else {
      <table mat-table [dataSource]="dataSource">

        <ng-container matColumnDef="nome">
          <th mat-header-cell *matHeaderCellDef> Nome </th>
          <td mat-cell *matCellDef="let element"> {{element.nome}} </td>
        </ng-container>

        <ng-container matColumnDef="telefone">
          <th mat-header-cell *matHeaderCellDef> Telefone </th>
          <td mat-cell *matCellDef="let element"> {{ formatPhone(element.contato) }} </td>
        </ng-container>

        <ng-container matColumnDef="cpf">
          <th mat-header-cell *matHeaderCellDef> CPF </th>
          <td mat-cell *matCellDef="let element"> {{ formatCpf(element.cpf) }} </td>
        </ng-container>

        <ng-container matColumnDef="especialidade">
          <th mat-header-cell *matHeaderCellDef> Especialidade </th>
          <td mat-cell *matCellDef="let element"> {{element.especialidade}} </td>
        </ng-container>

        <ng-container matColumnDef="update">
          <th mat-header-cell *matHeaderCellDef> Atualizar </th>
          <td mat-cell *matCellDef="let element">
            <mat-icon [style.cursor]="'pointer'" (click)="openDialogUpdate(element)">edit</mat-icon>
          </td>
        </ng-container>

        <ng-container matColumnDef="delete">
          <th mat-header-cell *matHeaderCellDef> Excluir Solicitante </th>
          <td mat-cell *matCellDef="let element">
            <button
              type="button"
              mat-icon-button
              aria-label="Excluir solicitante"
              (click)="deleteRequester(element)"
            >
              <mat-icon>delete_outline</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>

      <mat-paginator [pageSizeOptions]="[5, 10]"
                     [length]="(store.getRequesters | async)?.page?.totalElements"
                     [pageSize]="(store.getRequesters | async)?.page?.size"
                     [pageIndex]="(store.getRequesters | async)?.page?.number"
                     (page)="handlePageEvent($event)"
                     showFirstLastButtons
                     aria-label="Select page of periodic elements">
      </mat-paginator>
      }
    </div>
  </mat-card>
</div>
