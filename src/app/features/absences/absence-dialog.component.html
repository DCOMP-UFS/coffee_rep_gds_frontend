<h2 mat-dialog-title>
  {{ data.element ? 'Editar ausência / férias' : 'Nova ausência / férias' }}
</h2>
<mat-dialog-content class="dialog-form-content absence-dialog">
  <form class="form-stack" [formGroup]="form">
    <app-searchable-select-field
      class="full"
      label="Profissional (solicitante)"
      preset="requester"
      formControlName="solicitanteId"
      [options]="mapRequesterOptions(requesters)"
    />

    <mat-form-field appearance="outline" class="full">
      <mat-label>Data início</mat-label>
      <input matInput type="date" formControlName="inicio">
    </mat-form-field>

    <mat-form-field appearance="outline" class="full">
      <mat-label>Data fim</mat-label>
      <input matInput type="date" formControlName="fim">
    </mat-form-field>
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close type="button">Cancelar</button>
  <button mat-flat-button color="primary" type="button"
          [disabled]="form.disabled || form.invalid"
          (click)="save()">Salvar</button>
</mat-dialog-actions>
