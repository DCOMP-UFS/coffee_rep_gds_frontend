<div class="master-home">
  <mat-card>
    <div class="container-top-infos">
      <mat-card-title>
        <div class="card-title">
          <mat-icon>alarm</mat-icon>
          <span>Reserva Rápida</span>
        </div>

      </mat-card-title>
      <mat-card-content>
        <form class="quick-reservation-form" [formGroup]="reservationForm" (ngSubmit)="submitForm()">
          <p class="quick-reservation-form__intro">
            Comece pelo setor; as salas são carregadas em seguida.
          </p>
          @if (store.getSections | async; as sections) {
            <app-searchable-select-field
              label="Setor"
              preset="section"
              formControlName="section"
              [options]="mapSectionOptions(sections)"
              (selectionChange)="getRoomsById($event)"
            />
          }

          @if (store.getRoomsByFilter | async; as rooms) {
            <app-searchable-select-field
              label="Sala"
              preset="room"
              formControlName="room"
              [options]="mapRoomOptions(rooms)"
              [dependencyBlocked]="!reservationForm.get('section')?.value"
              [disabled]="!reservationForm.get('section')?.value"
            />
          }

          <mat-form-field appearance="outline">
            <mat-label>Data de reserva</mat-label>
            <input matInput [matDatepicker]="picker" formControlName="reservationDate">
            <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
            <mat-datepicker #picker></mat-datepicker>
          </mat-form-field>

          @if (store.getRequesters | async; as requesters) {
            <app-searchable-select-field
              label="Responsável"
              preset="requester"
              formControlName="requester"
              [options]="mapRequesterOptions(requesters)"
            />
          }

          <app-time-range-fields [compact]="true" />

          <div class="quick-reservation-form__actions">
            <button class="default-button" type="submit">Reservar Agora</button>
          </div>
        </form>
      </mat-card-content>
    </div>
  </mat-card>
  <mat-card>
    <div class="calendar">
      <mat-card-title>
        <div class="card-title">
          <mat-icon>calendar_today</mat-icon>
          <span>Calendário</span>
        </div>
      </mat-card-title>
      <mat-card-content>
        <app-calendar></app-calendar>
      </mat-card-content>
    </div>
  </mat-card>
</div>
