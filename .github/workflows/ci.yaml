name: Deploy Angular to EC2

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Docker image
        run: |
          docker build -t clinic_room_frontend:latest .

      - name: Tag Docker image
        run: |
          docker tag clinic_room_frontend:latest jogajuntoufs/clinic_room_frontend:latest

      - name: Docker Login
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Push Docker image
        run: |
          docker push jogajuntoufs/clinic_room_frontend:latest

      - name: Save SSH Key
        run: echo "${{ secrets.EC2_SSH_KEY }}" > /tmp/ssh_key
        shell: bash

      - name: Set Permissions for SSH Key
        run: chmod 600 ~/.ssh/id_rsa
        shell: bash

      - name: Deploy to EC2
        run: |
          ssh -o StrictHostKeyChecking=no -i /tmp/ssh_key ubuntu@${{ secrets.EC2_HOST }} << 'EOF'
          sudo docker stop clinic_room_frontend || true
          sudo docker rm clinic_room_frontend || true

          sudo docker rmi jogajuntoufs/clinic_room_frontend:latest || true

          sudo docker pull jogajuntoufs/clinic_room_frontend:latest

          sudo docker run -d --name clinic_room_frontend -p 80:80 jogajuntoufs/clinic_room_frontend:latest

          sudo docker update --restart unless-stopped clinic_room_frontend
          EOF
        shell: bash
