# Só verificação de código no GitHub (lint). O deploy continua na Vercel.
name: Qualidade

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Versão do pnpm vem só do campo packageManager no package.json (evita conflito com action-setup)
      - name: pnpm
        uses: pnpm/action-setup@v4

      - name: Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Instalar dependências
        run: pnpm install --frozen-lockfile

      - name: Biome (check, sem --write)
        run: pnpm exec biome check ./src
